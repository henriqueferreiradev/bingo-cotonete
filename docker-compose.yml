services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env.production
    volumes:
      - ./staticfiles:/app/staticfiles
    command: >
      sh -c "
        python manage.py migrate --settings=core.settings_prod &&
        python manage.py shell --settings=core.settings_prod -c \"
import os
from django.contrib.sites.models import Site
from django.contrib.auth.models import User
Site.objects.update_or_create(id=1, defaults={'domain': 'bingo.kordan.tech', 'name': 'bingo-cotonete'})
username = os.environ.get('DJANGO_SUPERUSER_USERNAME', 'admin')
password = os.environ.get('DJANGO_SUPERUSER_PASSWORD', '')
email = os.environ.get('DJANGO_SUPERUSER_EMAIL', '')
if password and not User.objects.filter(username=username).exists():
    User.objects.create_superuser(username, email, password)
\" &&
        gunicorn core.wsgi:application --bind 0.0.0.0:8002 --workers 2
      "
