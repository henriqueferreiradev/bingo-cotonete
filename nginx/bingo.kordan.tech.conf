server {
    listen 80;
    server_name bingo.kordan.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bingo.kordan.tech;

    ssl_certificate     /etc/letsencrypt/live/bingo.kordan.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bingo.kordan.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /home/deploy/bingo-cotonete/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
