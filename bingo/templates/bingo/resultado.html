{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado — Bingo SGF 2026</title>
<link rel="icon" type="image/x-icon" href="{% static 'img/icons/favicon.ico '%}"></head>
<body>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
  :root {
    --pink: #C2018C;
    --pink-border: rgba(194,1,140,0.35);
    --pink-glow: rgba(194,1,140,0.4);
    --bg: #06061a;
    --surface: #0d0d2b;
    --white: #ffffff;
    --muted: rgba(255,255,255,0.4);
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--white); }

  .page { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

  .title-bar { text-align: center; }
  .title-bar h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--pink); letter-spacing: 0.1em; }
  .title-bar p { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .podio { display: flex; align-items: flex-end; justify-content: center; gap: 1rem; }

  .podio-item { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; max-width: 180px; }
  .podio-item .avatar { border-radius: 50%; border: 2px solid var(--medal-color); }
  .podio-item .nome { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.05em; text-align: center; }
  .podio-item .acertos-num { font-size: 13px; color: var(--muted); }
  .podio-item .acertos-num span { color: var(--medal-color); font-weight: 700; }

  .podio-bloco { width: 100%; background: var(--surface); border: 1px solid var(--medal-color); border-radius: 12px 12px 0 0; display: flex; align-items: center; justify-content: center; }
  .podio-bloco .pos { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--medal-color); }

  .p1 { --medal-color: var(--gold); }
  .p1 .avatar { width: 80px; height: 80px; }
  .p1 .podio-bloco { height: 90px; }

  .p2 { --medal-color: var(--silver); }
  .p2 .avatar { width: 64px; height: 64px; }
  .p2 .podio-bloco { height: 65px; }

  .p3 { --medal-color: var(--bronze); }
  .p3 .avatar { width: 56px; height: 56px; }
  .p3 .podio-bloco { height: 45px; }

  .lista-section { background: var(--surface); border: 1px solid var(--pink-border); border-radius: 12px; overflow: hidden; }
  .lista-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--pink-border); }
  .lista-header span { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--pink); }

  .lista-item { display: flex; align-items: center; gap: 12px; padding: 0.6rem 1rem; border-bottom: 1px solid rgba(194,1,140,0.12); }
  .lista-item:last-child { border-bottom: none; }
  .lista-item .pos { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); min-width: 24px; text-align: center; }
  .lista-item .avatar-sm { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--pink-border); flex-shrink: 0; }
  .lista-item .nome { font-weight: 600; font-size: 14px; flex: 1; }
  .lista-item .badge { background: rgba(194,1,140,0.15); border: 1px solid var(--pink-border); color: var(--pink); font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 20px; white-space: nowrap; }

  .escolhas-section { background: var(--surface); border: 1px solid var(--pink-border); border-radius: 12px; padding: 1rem; }
  .escolhas-section .sec-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--pink); margin-bottom: 0.75rem; }
  .escolhas-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .escolhas-grid .num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; background: var(--pink); color: var(--white); width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }

  @media screen and (max-width: 480px) {
    .page { padding: 1rem 0.75rem; gap: 1rem; }
    .title-bar h1 { font-size: 28px; }
    .podio { gap: 0.5rem; }
    .podio-item { max-width: 110px; gap: 5px; }
    .podio-item .nome { font-size: 15px; }
    .p1 .avatar { width: 56px; height: 56px; }
    .p1 .podio-bloco { height: 70px; }
    .p2 .avatar { width: 46px; height: 46px; }
    .p2 .podio-bloco { height: 50px; }
    .p3 .avatar { width: 40px; height: 40px; }
    .p3 .podio-bloco { height: 36px; }
    .lista-item .nome { font-size: 13px; }
    .lista-item .badge { font-size: 11px; padding: 2px 7px; }
    .escolhas-grid .num { width: 32px; height: 32px; font-size: 17px; }
    .empate-display-nome { font-size: 24px; }
    .empate-card { min-width: 70px; padding: 8px 10px; }
    .empate-card .avatar-empate { width: 40px; height: 40px; font-size: 18px; }
    .empate-card .card-nome { font-size: 13px; }
    .btn-sortear { font-size: 18px; padding: 10px 22px; }
  }

  /* Empate / MD3 */
  .empate-section { background: var(--surface); border: 1px solid rgba(255,215,0,0.35); border-radius: 12px; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; align-items: center; }
  .empate-badge { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.4); color: var(--gold); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; }
  .empate-round-label { font-size: 12px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; }
  .empate-display { text-align: center; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 1rem 1.5rem; width: 100%; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .empate-display-nome { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.05em; color: var(--white); }
  .empate-display-msg { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; min-height: 20px; }
  .empate-cards { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; }
  .empate-card { display: flex; flex-direction: column; align-items: center; gap: 6px; background: rgba(0,0,0,0.2); border: 2px solid var(--pink-border); border-radius: 10px; padding: 10px 14px; min-width: 80px; transition: border-color 0.1s, transform 0.1s, background 0.1s, box-shadow 0.1s, opacity 0.4s; }
  .empate-card--ativo { border-color: var(--gold) !important; background: rgba(255,215,0,0.08) !important; transform: scale(1.05); }
  .empate-card--vencedor { border-color: var(--gold) !important; background: rgba(255,215,0,0.15) !important; transform: scale(1.05); box-shadow: 0 0 18px rgba(255,215,0,0.35); }
  .empate-card--campeao { border-color: var(--gold) !important; background: rgba(255,215,0,0.2) !important; transform: scale(1.1) !important; box-shadow: 0 0 32px rgba(255,215,0,0.55) !important; opacity: 1 !important; }
  .empate-card--dimmed { opacity: 0.4; }
  .empate-card .avatar-empate { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--pink-border); background: var(--surface); overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--pink); flex-shrink: 0; }
  .empate-card .avatar-empate img { width: 100%; height: 100%; object-fit: cover; }
  .empate-card .card-nome { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.05em; text-align: center; color: var(--white); }
  .win-dots { display: flex; gap: 5px; margin-top: 2px; }
  .win-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--pink); background: transparent; transition: background 0.3s, border-color 0.3s; }
  .win-dot--filled { background: var(--pink); border-color: var(--pink); }
  .win-dot--gold { background: var(--gold); border-color: var(--gold); }
  .btn-sortear { background: var(--pink); color: var(--white); border: none; border-radius: 10px; padding: 12px 28px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.08em; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .btn-sortear:hover:not(:disabled) { opacity: 0.85; transform: scale(1.03); }
  .btn-sortear:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<div class="page">
  <div class="title-bar">
    <h1>Apuração</h1>
    <p>Bingo SGF 2026 — Resultado</p>
  </div>
  <div class="escolhas-section">
    <div class="sec-label">Números sorteados</div>
    <div id="escolhas-grid" class="escolhas-grid"></div>
  </div>
  {% if tem_empate %}
  <div class="empate-section" id="empate-section">
    <div class="empate-badge" id="empate-badge">Desempate — Melhor de 3</div>
    <div class="empate-round-label" id="round-label">Rodada 1</div>
    <div class="empate-display">
      <div class="empate-display-nome" id="display-nome">—</div>
      <div class="empate-display-msg" id="display-msg"></div>
    </div>
    <div class="empate-cards" id="empate-cards"></div>
    <button class="btn-sortear" id="btn-sortear" onclick="sortearRodada()">Sortear rodada</button>
  </div>
  {% endif %}

  <div id="podio" class="podio"></div>

  <div class="lista-section">
    <div class="lista-header"><span>Classificação geral</span></div>
    <div id="lista"></div>
  </div>
</div>

<script>
const AVATAR_BASE = "https://cdn.discordapp.com/embed/avatars/0.png";

const resultados = {{ resultados_json|safe }};
const escolhas = {{ escolhas_json|safe }};

function avatar(url) {
  return url || AVATAR_BASE;
}

function renderPodio(top3) {
  const ordem = [1, 0, 2];
  const classes = ['p2', 'p1', 'p3'];
  const posLabels = ['2', '1', '3'];
  const podio = document.getElementById('podio');
  podio.innerHTML = '';

  ordem.forEach((idx, i) => {
    const r = top3[idx];
    if (!r) return;
    const div = document.createElement('div');
    div.className = `podio-item ${classes[i]}`;
    div.innerHTML = `
      <img class="avatar" src="${avatar(r.avatar_url)}" alt="${r.jogador}" onerror="this.src='${AVATAR_BASE}'">
      <div class="nome">${r.jogador}</div>
      <div class="acertos-num"><span>${r.total_iguais}</span> acertos</div>
      <div class="podio-bloco"><span class="pos">${posLabels[i]}</span></div>
    `;
    podio.appendChild(div);
  });
}

function renderLista(resto) {
  const lista = document.getElementById('lista');
  lista.innerHTML = '';
  resto.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'lista-item';
    div.innerHTML = `
      <span class="pos">${i + 4}</span>
      <img class="avatar-sm" src="${avatar(r.avatar_url)}" alt="${r.jogador}" onerror="this.src='${AVATAR_BASE}'">
      <span class="nome">${r.jogador}</span>
      <span class="badge">${r.total_iguais} acertos</span>
    `;
    lista.appendChild(div);
  });
}

function renderEscolhas(nums) {
  const grid = document.getElementById('escolhas-grid');
  grid.innerHTML = '';
  nums.forEach(n => {
    const span = document.createElement('span');
    span.className = 'num';
    span.textContent = n;
    grid.appendChild(span);
  });
}

if (resultados.length) {
  renderPodio(resultados.slice(0, 3));
  renderLista(resultados.slice(3));
  renderEscolhas(escolhas);
} else {
  document.querySelector('.page').innerHTML += '<p style="text-align:center;color:var(--muted);padding:2rem;">Nenhum resultado ainda.</p>';
}

{% if tem_empate %}
const empatados = {{ empatados_json|safe }};

var wins = new Array(empatados.length).fill(0);
var currentRound = 1;
var campeoIdx = -1;

(function initEmpate() {
  var badge = document.getElementById('empate-badge');
  var container = document.getElementById('empate-cards');
  if (!badge || !container || !empatados.length) return;

  badge.textContent = 'Desempate — Melhor de 3 (' + empatados[0].total_iguais + ' acertos)';

  empatados.forEach(function(p, idx) {
    var card = document.createElement('div');
    card.className = 'empate-card';
    card.id = 'empate-card-' + idx;

    var avatarDiv = document.createElement('div');
    avatarDiv.className = 'avatar-empate';

    if (p.avatar_url) {
      var img = document.createElement('img');
      img.src = p.avatar_url;
      img.alt = '';
      img.onerror = function() {
        img.style.display = 'none';
        avatarDiv.textContent = p.jogador.charAt(0).toUpperCase();
      };
      avatarDiv.appendChild(img);
    } else {
      avatarDiv.textContent = p.jogador.charAt(0).toUpperCase();
    }

    var nomeDiv = document.createElement('div');
    nomeDiv.className = 'card-nome';
    nomeDiv.textContent = p.jogador;

    var dotsDiv = document.createElement('div');
    dotsDiv.className = 'win-dots';
    dotsDiv.id = 'win-dots-' + idx;
    for (var d = 0; d < 3; d++) {
      var dot = document.createElement('div');
      dot.className = 'win-dot';
      dot.id = 'dot-' + idx + '-' + d;
      dotsDiv.appendChild(dot);
    }

    card.appendChild(avatarDiv);
    card.appendChild(nomeDiv);
    card.appendChild(dotsDiv);
    container.appendChild(card);
  });
})();

function updateDots(playerIdx, useGold) {
  for (var d = 0; d < 3; d++) {
    var dot = document.getElementById('dot-' + playerIdx + '-' + d);
    if (!dot) continue;
    dot.classList.remove('win-dot--filled', 'win-dot--gold');
    if (d < wins[playerIdx]) {
      dot.classList.add(useGold ? 'win-dot--gold' : 'win-dot--filled');
    }
  }
}

function sortearRodada() {
  if (campeoIdx !== -1) return;

  var n = empatados.length;
  var totalSteps = 25 + Math.floor(Math.random() * 15);
  var vencedorIdx = Math.floor(Math.random() * n);

  var seq = [];
  var cur = Math.floor(Math.random() * n);
  for (var i = 0; i < totalSteps - 1; i++) {
    seq.push(cur);
    cur = (cur + 1) % n;
  }
  seq.push(vencedorIdx);

  var btn = document.getElementById('btn-sortear');
  btn.disabled = true;
  document.getElementById('display-msg').textContent = '';

  var cards = document.querySelectorAll('.empate-card');
  cards.forEach(function(c) { c.classList.remove('empate-card--vencedor', 'empate-card--ativo'); });

  function calcDelay(s) {
    var threshold = totalSteps * 0.6;
    if (s < threshold) return 80;
    var prog = (s - threshold) / (totalSteps - threshold);
    return Math.round(80 + prog * prog * 600);
  }

  var step = 0;

  function tick() {
    var idx = seq[step];
    cards.forEach(function(c, i) { c.classList.toggle('empate-card--ativo', i === idx); });
    document.getElementById('display-nome').textContent = empatados[idx].jogador;

    var isLast = step === seq.length - 1;
    step++;

    if (isLast) {
      setTimeout(function() {
        wins[vencedorIdx]++;

        cards.forEach(function(c, i) {
          c.classList.remove('empate-card--ativo');
          c.classList.toggle('empate-card--vencedor', i === vencedorIdx);
        });

        updateDots(vencedorIdx, false);

        document.getElementById('display-nome').textContent = empatados[vencedorIdx].jogador;
        document.getElementById('display-msg').textContent = 'Venceu a Rodada ' + currentRound + '!';
        document.getElementById('round-label').textContent = 'Rodada ' + currentRound;

        if (wins[vencedorIdx] >= 3) {
          campeoIdx = vencedorIdx;
          setTimeout(function() {
            cards.forEach(function(c, i) {
              c.classList.remove('empate-card--vencedor', 'empate-card--ativo');
              if (i === campeoIdx) {
                c.classList.add('empate-card--campeao');
              } else {
                c.classList.add('empate-card--dimmed');
              }
            });
            for (var p = 0; p < empatados.length; p++) {
              updateDots(p, p === campeoIdx);
            }
            document.getElementById('display-nome').textContent = empatados[campeoIdx].jogador;
            document.getElementById('display-msg').textContent = 'CAMPEÃO DO DESEMPATE!';
            document.getElementById('round-label').textContent = 'Desempate concluído';
            btn.style.display = 'none';
          }, 1200);
        } else {
          var maxWins = Math.max.apply(null, wins);
          setTimeout(function() {
            cards.forEach(function(c) { c.classList.remove('empate-card--vencedor'); });
            currentRound++;
            document.getElementById('round-label').textContent = 'Rodada ' + currentRound;
            document.getElementById('display-nome').textContent = '—';
            document.getElementById('display-msg').textContent = '';
            btn.textContent = 'Próxima rodada (' + maxWins + '/3)';
            btn.disabled = false;
          }, 2000);
        }
      }, 800);
      return;
    }

    setTimeout(tick, calcDelay(step));
  }

  tick();
}
{% endif %}
</script>
</body>
</html>
